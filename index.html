<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Heart for You</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050005; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // --- ตั้งค่าข้อความตรงนี้ได้เลย ---
        const TEXT = "I love you"; 
        
        let angleX = 0;
        let angleY = 0;
        let angleZ = 0;
        
        const points = [];
        const numPoints = 350; // จำนวนคำ ยิ่งเยอะยิ่งแน่นเป็นรูปหัวใจ

        // 1. คำนวณพิกัดหัวใจแบบ 3 มิติเตรียมไว้
        for (let i = 0; i < numPoints; i++) {
            let t = (i / numPoints) * Math.PI * 2;
            
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            
            // สุ่มกระจายค่า Z ให้หนาเป็นทรงมิติขึ้นมา
            let z = (Math.random() - 0.5) * 10 * Math.sin(t); 

            points.push({ x: x, y: -y, z: z, id: i });
        }

        // 2. สร้างระบบละอองดาวฉากหลัง (Particles)
        const particles = [];
        for(let i=0; i<100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.2
            });
        }

        function draw() {
            // เคลียร์หน้าจอแบบโปร่งแสงเล็กน้อยเพื่อให้เกิด Effect หางแสง (Motion Blur)
            ctx.fillStyle = "rgba(5, 0, 5, 0.2)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            // วาดละอองดาวฉากหลัง (แก้ไขโค้ดที่หลุดตรงนี้เรียบร้อยแล้ว)
            ctx.fillStyle = "rgba(255, 150, 200, 0.5)";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
            });

            const scale = Math.min(canvas.width, canvas.height) * 0.015;

            // คำนวณการหมุน 3D
            const projectedPoints = points.map(p => {
                // หมุนแกน X
                let y1 = p.y * Math.cos(angleX) - p.z * Math.sin(angleX);
                let z1 = p.y * Math.sin(angleX) + p.z * Math.cos(angleX);
                
                // หมุนแกน Y
                let x2 = p.x * Math.cos(angleY) + z1 * Math.sin(angleY);
                let z2 = -p.x * Math.sin(angleY) + z1 * Math.cos(angleY);
                
                const distance = 40;
                const fov = 400;
                const f = fov / (distance + z2);
                
                return {
                    x: cx + x2 * scale * f,
                    y: cy + y1 * scale * f,
                    z: z2,
                    id: p.id
                };
            });

            // เรียงลำดับจากลึกไปตื้น
            projectedPoints.sort((a, b) => b.z - a.z);

            // วาดตัวอักษรลงบน Canvas
            projectedPoints.forEach(p => {
                let fontSize = Math.max(6, 12 + (p.z * 0.3));
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                let brightness = Math.floor(60 + (p.z * 2));
                brightness = Math.max(20, Math.min(100, brightness));
                
                let hue = (p.id / numPoints) * 40 + 330; 
                
                ctx.fillStyle = `hsl(${hue}, 100%, ${brightness}%)`;
                
                if(p.z > 0) {
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.fillText(TEXT, p.x, p.y);
            });

            // ความเร็วในการหมุนแต่ละแกน
            angleX += 0.005;
            angleY += 0.015;
            angleZ += 0.002;

            requestAnimationFrame(draw);
        }

        draw();

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>

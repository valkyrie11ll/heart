<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Love Heart Canvas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>

    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let angle = 0;
        const NUM_STEPS = 70;
        const SCALE = 10;
        const TEXT = "I love you"; // แก้ไขเครื่องหมายคำพูดตรงนี้

        function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
        function heartY(t) { return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            ctx.font = "bold 10px Arial"; // แก้ไขเครื่องหมายคำพูดตรงนี้
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let i = 0; i < NUM_STEPS; i++) {
                // คำนวณค่า t สัมพันธ์กับมุมที่เปลี่ยนไปเพื่อให้เกิดการเคลื่อนไหว
                let t = (i / NUM_STEPS) * Math.PI * 2 + angle;
                
                let x = cx + heartX(t) * SCALE;
                let y = cy - heartY(t) * SCALE; // กลับค่า Y ขึ้นข้างบนเพื่อให้หัวใจไม่กลับหัว

                // ไล่เฉดสีชมพู-แดงตามตำแหน่ง
                ctx.fillStyle = `hsl(${(i / NUM_STEPS) * 30 + 340}, 100%, 60%)`;
                ctx.fillText(TEXT, x, y);
            }
            
            angle += 0.02; // ความเร็วในการขยับ
            requestAnimationFrame(draw);
        }

        draw();

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Viewvi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>

    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let angle = 0;
        const NUM_STEPS = 80; // ปรับเพิ่มจำนวนคำนิดหน่อยเพื่อให้หัวใจดูแน่นขึ้นครับ
        const SCALE = 11;     // ขนาดของหัวใจ
        const TEXT = "I love you viewvi"; // เปลี่ยนเป็นชื่อหวานใจเรียบร้อย

        // สูตรคณิตศาสตร์รูปหัวใจดั้งเดิมแบบโค้ดแรก
        function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
        function heartY(t) { return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            ctx.font = "bold 11px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let i = 0; i < NUM_STEPS; i++) {
                // คำนวณมุม t ให้สอดคล้องกับตัวแปร angle เพื่อให้หัวใจเต้น/ขยับได้ละมุนๆ
                let t = (i / NUM_STEPS) * Math.PI * 2 + angle;
                
                let x = cx + heartX(t) * SCALE;
                let y = cy - heartY(t) * SCALE; // กลับค่า Y ขึ้นข้างบนเพื่อไม่ให้หัวใจคว่ำ

                // ไล่เฉดสีชมพู-แดงนีออน (HSL) หวานๆ
                ctx.fillStyle = `hsl(${(i / NUM_STEPS) * 35 + 335}, 100%, 60%)`;
                
                ctx.fillText(TEXT, x, y);
            }
            
            angle += 0.015; // ความเร็วในการขยับเยื้องของตัวอักษร
            requestAnimationFrame(draw);
        }

        draw();

        // รองรับการเปิดในมือถือของแฟน ถ้าหมุนจอก็จะยังอยู่ตรงกลาง
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Viewvi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>

    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        
        let angle = 0;
        const NUM_STEPS = 90; 
        const SCALE = 15;     
        const TEXT = "I love you viewvi"; 

        // สูตรคณิตศาสตร์รูปหัวใจดั้งเดิม
        function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
        function heartY(t) { return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

        // ระบบดาวหางสีชมพูฉากหลัง
        const meteors = [];
        const maxMeteors = 25; // [แก้ไข] เพิ่มปริมาณดาวหางเป็น 25 ดวงเต็มหน้าจอ

        function createMeteor() {
            return {
                x: Math.random() * (canvas.width + 300) - 150,
                y: Math.random() * (canvas.height * 0.7) - 100, // กระจายตัวจากด้านบนและตรงกลางจอ
                length: Math.random() * 35 + 15,          
                speed: Math.random() * 2 + 1.5,             
                size: Math.random() * 1.5 + 0.8             
            };
        }

        for (let i = 0; i < maxMeteors; i++) {
            meteors.push(createMeteor());
        }

        function draw() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // วาดฝนดาวหางสีชมพู (ปริมาณเยอะขึ้น)
            meteors.forEach((m) => {
                ctx.beginPath();
                let gradient = ctx.createLinearGradient(m.x, m.y, m.x - m.length, m.y - m.length);
                gradient.addColorStop(0, "rgba(255, 192, 203, 1)"); 
                gradient.addColorStop(1, "rgba(255, 105, 180, 0)"); 
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = m.size;
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(m.x - m.length, m.y - m.length);
                ctx.stroke();

                m.x += m.speed;
                m.y += m.speed;

                if (m.x > canvas.width + 50 || m.y > canvas.height + 50) {
                    Object.assign(m, createMeteor());
                    m.y = -30;
                    m.x = Math.random() * (canvas.width * 0.9);
                }
            });

            // วาดรูปหัวใจสีชมพูบางๆ เคลือบพื้นหลัง
            ctx.beginPath();
            for (let j = 0; j <= 120; j++) {
                let tBg = (j / 120) * Math.PI * 2;
                let xBg = cx + heartX(tBg) * SCALE;
                let yBg = cy - heartY(tBg) * SCALE;
                if (j === 0) ctx.moveTo(xBg, yBg);
                else ctx.lineTo(xBg, yBg);
            }
            ctx.closePath();
            ctx.fillStyle = "rgba(255, 105, 180, 0.08)"; 
            ctx.fill();

            // วาดตัวอักษรขนาดใหญ่รอบหัวใจ
            ctx.font = "bold 22px Arial"; 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let i = 0; i < NUM_STEPS; i++) {
                let t = (i / NUM_STEPS) * Math.PI * 2 + angle;
                
                let x = cx + heartX(t) * SCALE;
                let y = cy - heartY(t) * SCALE;

                ctx.fillStyle = `hsl(${(i / NUM_STEPS) * 35 + 335}, 100%, 65%)`;
                ctx.fillText(TEXT, x, y);
            }
            
            // ความเร็วใจเย็นๆ 0.002 เท่าเดิมตามที่ชอบครับ
            angle += 0.002; 
            requestAnimationFrame(draw);
        }

        draw();

        window.addEventListener("resize", () => {
            resizeCanvas();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Heart for You</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050005; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // --- ตั้งค่าข้อความตรงนี้ได้เลย ---
        const TEXT = "I love you"; 
        
        let angleX = 0;
        let angleY = 0;
        let angleZ = 0;
        
        const points = [];
        const numPoints = 400; // เพิ่มจำนวนคำให้รูปหัวใจแน่นและชัดขึ้น

        // 1. สร้างพิกัดเริ่มต้นแบบกระจายฟุ้ง (Random) และพิกัดเป้าหมายที่เป็นรูปหัวใจ (Target)
        for (let i = 0; i < numPoints; i++) {
            let t = (i / numPoints) * Math.PI * 2;
            
            // พิกัดเป้าหมายรูปหัวใจ 3D
            let targetX = 16 * Math.pow(Math.sin(t), 3);
            let targetY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            let targetZ = (Math.random() - 0.5) * 8 * Math.sin(t); 

            points.push({
                // พิกัดปัจจุบัน (เริ่มจากลอยกระจายตัวอยู่ขอบๆ หรือสุ่มทั่วจอ)
                x: (Math.random() - 0.5) * 150,
                y: (Math.random() - 0.5) * 150,
                z: (Math.random() - 0.5) * 100,
                // เก็บค่าพิกัดเป้าหมายรูปหัวใจไว้
                tx: targetX,
                ty: targetY,
                tz: targetZ,
                id: i
            });
        }

        // 2. ระบบละอองดาวฉากหลัง
        const particles = [];
        for(let i=0; i<80; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.4 + 0.1
            });
        }

        function draw() {
            // เคลียร์หน้าจอพร้อมทำหางแสงละมุนๆ
            ctx.fillStyle = "rgba(5, 0, 5, 0.25)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            // วาดละอองดาวเบื้องหลัง
            ctx.fillStyle = "rgba(255, 160, 200, 0.4)";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
            });

            const scale = Math.min(canvas.width, canvas.height) * 0.015;

            // คำนวณการดึงดูด: ค่อยๆ ลอยขยับจากจุดสุ่มเข้าไปหาจุดที่เป็นรูปหัวใจ
            points.forEach(p => {
                // ใช้หลักการ Lerp (Linear Interpolation) ให้ค่อยๆ ลอยเข้าไปหาเป้าหมายอย่างนุ่มนวล
                p.x += (p.tx - p.x) * 0.03;
                p.y += (p.ty - p.y) * 0.03;
                p.z += (p.tz - p.z) * 0.03;
            });

            // คำนวณการหมุน 3D หลังจากที่เริ่มรวมตัวกันแล้ว
            const projectedPoints = points.map(p => {
                // หมุนแกน X
                let y1 = p.y * Math.cos(angleX) - p.z * Math.sin(angleX);
                let z1 = p.y * Math.sin(angleX) + p.z * Math.cos(angleX);
                
                // หมุนแกน Y
                let x2 = p.x * Math.cos(angleY) + z1 * Math.sin(angleY);
                let z2 = -p.x * Math.sin(angleY) + z1 * Math.cos(angleY);
                
                const distance = 40;
                const fov = 400;
                const f = fov / (distance + z2);
                
                return {
                    x: cx + x2 * scale * f,
                    y: cy + y1 * scale * f,
                    z: z2,
                    id: p.id
                };
            });

            // เรียงมิติมุมลึก-ตื้น
            projectedPoints.sort((a, b) => b.z - a.z);

            // วาดข้อความ I love you ลงหน้าจอ
            projectedPoints.forEach(p => {
                let fontSize = Math.max(5, 11 + (p.z * 0.25));
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                let brightness = Math.floor(65 + (p.z * 1.8));
                brightness = Math.max(30, Math.min(100, brightness));
                
                // เฉดสีชมพูนีออนไล่ไปหาแดงหวานๆ
                let hue = (p.id / numPoints) * 35 + 335; 
                
                ctx.fillStyle = `hsl(${hue}, 100%, ${brightness}%)`;
                
                if(p.z > 0) {
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.fillText(TEXT, p.x, p.y);
            });

            // ปล่อยให้มันค่อยๆ หมุนไปเรื่อยๆ รอบตัว
            angleX += 0.003;
            angleY += 0.012;
            angleZ += 0.001;

            requestAnimationFrame(draw);
        }

        draw();

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>

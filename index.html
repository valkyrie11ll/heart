<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Viewvi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>

    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let angle = 0;
        const NUM_STEPS = 90; // เพิ่มจำนวนคำอีกนิดให้ล้อมรูปหัวใจวงใหญ่ได้เนียนตาขึ้น
        const SCALE = 15;     // ปรับหัวใจให้ดวงใหญ่ขึ้นเต็มตา (เดิม 11)
        const TEXT = "I love you viewvi"; 

        // สูตรคณิตศาสตร์รูปหัวใจดั้งเดิม
        function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
        function heartY(t) { return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            // -------------------------------------------------------------
            // [ส่วนที่เพิ่มใหม่] วาดรูปหัวใจสีชมพูบางๆ เป็นพื้นหลังล่างสุด
            // -------------------------------------------------------------
            ctx.beginPath();
            for (let j = 0; j <= 200; j++) {
                let tBg = (j / 200) * Math.PI * 2;
                let xBg = cx + heartX(tBg) * SCALE;
                let yBg = cy - heartY(tBg) * SCALE;
                if (j === 0) ctx.moveTo(xBg, yBg);
                else ctx.lineTo(xBg, yBg);
            }
            ctx.closePath();
            ctx.fillStyle = "rgba(255, 105, 180, 0.08)"; // สีชมพูจางๆ 8% โรแมนติกสุดๆ
            ctx.fill();
            // -------------------------------------------------------------

            // วาดตัวอักษรวิ่งรอบหัวใจ
            ctx.font = "bold 11px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let i = 0; i < NUM_STEPS; i++) {
                let t = (i / NUM_STEPS) * Math.PI * 2 + angle;
                
                let x = cx + heartX(t) * SCALE;
                let y = cy - heartY(t) * SCALE;

                // ไล่เฉดสีชมพู-แดงนีออนหวานๆ
                ctx.fillStyle = `hsl(${(i / NUM_STEPS) * 35 + 335}, 100%, 65%)`;
                
                ctx.fillText(TEXT, x, y);
            }
            
            angle += 0.007; // ปรับให้เคลื่อนไหวช้าลงอย่างนุ่มนวล (เดิม 0.015)
            requestAnimationFrame(draw);
        }

        draw();

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>

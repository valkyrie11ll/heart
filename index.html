<!DOCTYPE html>
<html lang="th">
<head>

            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        canvas {

            position: absolute;
            top: 0;

        }

</head>

            let t = (i / numPoints) * Math.PI * 2;
            
            // พิกัดรูปหัวใจ 2D ดั้งเดิม

            // สุ่มกระจายค่า Z ให้หนาเป็นทรงมิติขึ้นมา
            let z = (Math.random() - 0.5) * 10 * Math.sin(t); 

            points.push({ x: x, y: -y, z: z, id: i });
        }
